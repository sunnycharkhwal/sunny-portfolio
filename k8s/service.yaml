# ============================================================
# k8s/service.yaml — Kubernetes Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: sunny-portfolio
  namespace: sunny-portfolio
  labels:
    app: sunny-portfolio
spec:
  selector:
    app: sunny-portfolio
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
